<article
  class="event-card"
  [class.event-card--has-circuit]="!!event().venueImageUrl"
  [style.--circuit]="circuitMask()"
>
  <div class="event-card__main">
    <h3 class="event-card__title">
      <span class="event-card__sport">{{ event().sportName }}</span>
      <span class="event-card__sep" aria-hidden="true">–</span>
      <span class="event-card__name">{{ event().name }}</span>
    </h3>

    <p class="event-card__sub">
      @if (event().competitionName) {
        <span>{{ event().competitionName }}</span>
      }
      @if (event().venueName) {
        <span class="event-card__dot" aria-hidden="true">·</span>
        <span class="event-card__venue">{{ event().venueName }}</span>
      }
    </p>

    <div class="event-card__tags">
      <span class="event-card__tag event-card__tag--type">{{ event().eventType }}</span>
      @if (showStatus()) {
        <span class="event-card__tag event-card__tag--status" [attr.data-status]="event().status">
          {{ event().status }}
        </span>
      }
    </div>
  </div>

  <div class="event-card__meta">
    <time class="event-card__time">{{ event().startTimeUtc | eventTime: locale() : timeZone() }}</time>
  </div>
</article>
