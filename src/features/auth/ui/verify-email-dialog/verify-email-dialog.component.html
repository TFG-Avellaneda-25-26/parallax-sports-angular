@if (isOpen()) {
  <div #backdrop class="verify-backdrop" tabindex="0" (click)="closeModal()" (keydown.enter)="closeModal()" (keydown.space)="$event.preventDefault(); closeModal()">
    <div
      #panel
      class="verify-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="verify-panel-heading"
      aria-describedby="verify-panel-status"
      tabindex="-1"
      (keydown)="onPanelKeydown($event)"
      (click)="$event.stopPropagation()"
    >
      <app-otp-dialog
        (verified)="closeModal()"
        (closed)="closeModal()"
      />
    </div>
  </div>
}
