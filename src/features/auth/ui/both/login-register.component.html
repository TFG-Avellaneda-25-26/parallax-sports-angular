<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-tabs">
      <button
        [class.auth-tab--active]="currentMode() === 'login'"
        (click)="switchMode('login')"
        class="auth-tab"
      >
        Iniciar Sesión
      </button>
      <button
        [class.auth-tab--active]="currentMode() === 'register'"
        (click)="switchMode('register')"
        class="auth-tab"
      >
        Registrarse
      </button>
    </div>

    <div class="auth-content">
      @switch (currentMode()) {
        @case ('login') {
          <div class="form-container">
            <h2 class="form-title">Bienvenido de vuelta</h2>
            <p class="form-subtitle">Inicia sesión en tu cuenta</p>
            <app-login-form />
          </div>
        }
        @case ('register') {
          <div class="form-container">
            <h2 class="form-title">Crea tu cuenta</h2>
            <p class="form-subtitle">Únete a nuestra comunidad</p>
            <app-register-form />
          </div>
        }
      }
    </div>
  </div>
</div>
