<div class="otp-modal">
  <form [formGroup]="otpForm" (ngSubmit)="verify()" class="otp-modal__form">
    <div
      class="otp-cells"
      [class.is-error]="state() === 'error'"
      [class.is-success]="state() === 'success'"
      [class.is-verifying]="state() === 'verifying'"
      [style.width]="totalWidthPx"
      [style.height]="cellSizePx"
    >
      <svg
        #cellsLayer
        class="otp-cells__svg"
        [attr.viewBox]="'0 0 ' + totalWidth + ' ' + cellSize"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        @for (_ of cells; track $index) {
          <rect
            class="otp-cells__rect"
            [attr.x]="$index * (cellSize + cellGap) + 1"
            y="1"
            [attr.width]="cellSize - 2"
            [attr.height]="cellSize - 2"
            rx="8"
            ry="8"
          />
        }
      </svg>

      <ng-otp-input
        formControlName="code"
        [config]="otpConfig"
      />
    </div>

    <button
      type="submit"
      class="otp-modal__submit"
      [disabled]="otpForm.invalid || state() === 'verifying' || state() === 'success'"
    >
      @if (state() === 'verifying') {
        <span>Verifying…</span>
      } @else if (state() === 'success') {
        <span>Verified</span>
      } @else {
        <span>Verify</span>
      }
    </button>
  </form>
</div>
