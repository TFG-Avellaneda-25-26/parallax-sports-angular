<div class="otp-modal">
  <h2 id="verify-panel-heading" class="sr-only">Verify your email</h2>
  <p id="verify-panel-status" class="sr-only" role="status" aria-live="polite">
    {{ statusMessage() }}
  </p>

  <form [formGroup]="otpForm" (ngSubmit)="verify()" class="otp-modal__form">
    <div
      class="otp-cells"
      [class.is-error]="state() === 'error'"
      [class.is-success]="state() === 'success'"
      [class.is-verifying]="state() === 'verifying'"
      [style.width]="totalWidthPx"
      [style.height]="cellSizePx"
    >
      <svg
        #cellsLayer
        class="otp-cells__svg"
        [attr.viewBox]="'0 0 ' + totalWidth + ' ' + cellSize"
        preserveAspectRatio="none"
        aria-hidden="true"
      >
        @for (_ of cells; track $index) {
          <rect
            class="otp-cells__rect"
            [attr.x]="$index * (cellSize + cellGap) + 1"
            y="1"
            [attr.width]="cellSize - 2"
            [attr.height]="cellSize - 2"
            rx="8"
            ry="8"
          />
        }
      </svg>

      <ng-otp-input
        formControlName="code"
        [config]="otpConfig"
      />

      <!-- Top-right: resend + close -->
      <div class="otp-cells__top-actions">
        <button
          type="button"
          class="otp-cells__action otp-cells__action--accent"
          [class.is-spinning]="isResending()"
          [disabled]="isResending()"
          (click)="resend()"
          aria-label="Resend verification email"
          title="Resend verification email"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
        </button>

        <button
          type="button"
          class="otp-cells__action otp-cells__action--danger"
          (click)="close()"
          aria-label="Close"
          title="Close"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <!-- Bottom-right: send / spinner -->
      <button
        type="submit"
        class="otp-cells__action otp-cells__action--accent otp-cells__send"
        [class.is-spinning]="state() === 'verifying'"
        [disabled]="otpForm.invalid || state() === 'verifying' || state() === 'success'"
        [attr.aria-label]="state() === 'verifying' ? 'Verifying' : 'Verify code'"
        [attr.title]="state() === 'verifying' ? 'Verifying' : 'Verify'"
      >
        @if (state() === 'verifying') {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z" />
            <path d="M6 12h16" />
          </svg>
        }
      </button>
    </div>
  </form>
</div>
