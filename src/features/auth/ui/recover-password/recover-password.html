<div class="auth-header">
  <h1 class="auth-title">New password</h1>
  <p class="auth-subtitle">Choose a strong password for your account</p>
</div>

<form [formRoot]="passwordForm" class="auth-form">
  <div class="field">
    <app-stateful-input
      type="password"
      label="New Password"
      fieldId="recoverPassword"
      [formField]="passwordForm.password"
    />
  </div>

  <div class="field">
    <app-stateful-input
      type="password"
      label="Confirm Password"
      fieldId="recoverConfirmPassword"
      [formField]="passwordForm.confirmPassword"
    />
  </div>

  <div class="field">
    <button
      class="btn-submit"
      type="submit"
      [disabled]="passwordForm().submitting() || passwordForm().invalid()"
    >
      @if (passwordForm().submitting()) {
        <span class="spinner"></span>
      } @else {
        Reset password
      }
    </button>

    @if (passwordForm().errors(); as errs) {
      @for (err of errs; track err) {
        <p class="form-error">{{ err.message }}</p>
      }
    }
  </div>
</form>
