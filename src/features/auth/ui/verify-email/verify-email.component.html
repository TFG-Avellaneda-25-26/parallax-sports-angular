@if (!isOpen()) {
  <button
    #badge
    type="button"
    class="verify-badge"
    (click)="openModal()"
    aria-label="Email is not verified — click to verify"
    title="Email is not verified — click to verify"
  >
    Verify
  </button>
} @else {
  <div #backdrop class="otp-backdrop" (click)="closeModal()"></div>
  <div #panel class="otp-panel" (keydown)="onPanelKeydown($event)">
    <app-otp-dialog (verified)="closeModal()" (closed)="closeModal()" />
  </div>
}
