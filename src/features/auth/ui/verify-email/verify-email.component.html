@if (!isOpen()) {
  <button
    #badge
    type="button"
    class="verify-badge"
    (click)="openModal()"
    aria-label="Email is not verified — click to verify"
    title="Email is not verified — click to verify"
  >
    Verify
  </button>
}

@if (isOpen()) {
  <div
    #backdrop
    class="verify-backdrop"
  >
    <div
      #panel
      class="verify-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="verify-panel-heading"
      aria-describedby="verify-panel-status"
      tabindex="-1"
      (keydown)="onPanelKeydown($event)"
    >
      <app-otp-dialog
        (verified)="closeModal()"
        (closed)="closeModal()"
      />
    </div>
  </div>
}
