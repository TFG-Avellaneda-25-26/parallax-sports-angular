@if (!isOpen()) {
  <button
    #badge
    type="button"
    class="verify-badge"
    (click)="openModal()"
    aria-label="Email is not verified — click to verify"
    title="Email is not verified — click to verify"
  >
    <span class="verify-badge__pulse" aria-hidden="true"></span>
    <svg
      class="verify-badge__icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="M12 9v4" />
      <path d="M12 17h.01" />
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
    </svg>
    <span class="verify-badge__label">Email not verified</span>
  </button>
}

@if (isOpen()) {
  <div
    #backdrop
    class="verify-backdrop"
    (click)="onBackdropClick($event)"
  >
    <div
      #panel
      class="verify-panel"
      role="dialog"
      aria-modal="true"
    >
      <button
        type="button"
        class="verify-panel__close"
        (click)="closeModal()"
        aria-label="Close"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      <app-otp-dialog (verified)="closeModal()" />
    </div>
  </div>
}
