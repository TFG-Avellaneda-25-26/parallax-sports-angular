<div class="auth-header">
  <h1 class="auth-title">{{ i18n.otpTitle }}</h1>
  <p class="auth-subtitle">
    {{ i18n.otpSubtitle }} <strong>{{ authModeStore.recoverEmail() }}</strong>
  </p>
</div>

<app-otp-input
  #otpInput
  [showClose]="false"
  [showResend]="true"
  [isResending]="isResending()"
  (verified)="onVerified($event)"
  (resendRequested)="onResend()"
/>

<p class="auth-switch">
  {{ i18n.otpWrongEmail }}
  <button class="switch-btn" (click)="authModeStore.goToRecover(authModeStore.recoverEmail())">
    {{ i18n.otpGoBack }}
  </button>
</p>
