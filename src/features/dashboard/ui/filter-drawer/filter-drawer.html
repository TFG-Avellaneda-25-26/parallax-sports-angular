@if (isOpen()) {
  <div class="drawer-backdrop" (click)="close()" aria-hidden="true"></div>
  <aside class="drawer" role="dialog" aria-label="Filters">
    <header class="drawer__header">
      <h2 class="drawer__title">Filters</h2>
      <button type="button" class="drawer__close" (click)="close()" aria-label="Close filters">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
    </header>
    <div class="drawer__body">
      <app-filter-tree/>
    </div>
  </aside>
}
