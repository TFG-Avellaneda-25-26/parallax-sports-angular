<div class="identities-list">
  @for (item of identities(); track item.provider) {
  <div class="identity-row">
    <div class="identity-info">
      <svg
        class="identity-icon"
        [attr.viewBox]="item.oauthProvider.viewBox"
        xmlns="http://www.w3.org/2000/svg"
        [attr.fill]="item.oauthProvider.fixedColors ? undefined : 'currentColor'"
      >
        @for (path of item.oauthProvider.paths; track path.d) {
          <path [attr.d]="path.d" [attr.fill]="path.fill ?? undefined" />
        }
      </svg>

      <span class="identity-label">{{ item.provider | titlecase }}</span>
    </div>

    <button
      type="button"
      class="identity-toggle"
      [class.identity-toggle--linked]="item.isLinked"
      [attr.aria-label]="item.isLinked
        ? (i18n.unlink + ' ' + (item.provider | titlecase))
        : (i18n.link + ' ' + (item.provider | titlecase))"
      [attr.title]="item.isLinked
        ? (i18n.unlink + ' ' + (item.provider | titlecase))
        : (i18n.link + ' ' + (item.provider | titlecase))"
      (click)="item.isLinked
        ? userStore.disconnectIdentity(item.identity!.id)
        : userStore.linkIdentity(item.provider)"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M17 19a1 1 0 0 1-1-1v-2a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2a1 1 0 0 1-1 1z" />
        <path d="M17 21v-2" />
        <path d="M19 14V6.5a1 1 0 0 0-7 0v11a1 1 0 0 1-7 0V10" />
        <path d="M21 21v-2" />
        <path d="M3 5V3" />
        <path d="M4 10a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2a2 2 0 0 1-2 2z" />
        <path d="M7 5V3" />
      </svg>
    </button>
  </div>
  }
</div>
