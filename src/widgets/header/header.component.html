<header class="header">
  <div class="header__bg" aria-hidden="true"></div>
  <div class="header__inner">
    <a class="header__brand" routerLink="/" aria-label="Parallax Sports — home">
      <span class="header__brand-mark" aria-hidden="true">
        <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="11.5" fill="none" stroke="currentColor" stroke-width="1.5" />
          <path d="M3 14 H25" fill="none" stroke="currentColor" stroke-width="1.5" />
          <path d="M14 3 Q22 14 14 25 Q6 14 14 3 Z" fill="none" stroke="currentColor" stroke-width="1.5" />
        </svg>
      </span>
      <span class="header__brand-text">
        <span class="header__brand-primary">PARALLAX</span>
        <span class="header__brand-sep" aria-hidden="true">·</span>
        <span class="header__brand-secondary">SPORTS</span>
      </span>
    </a>

    <div class="header__center">
      @if (userStore.isAuthenticated() && !userStore.isVerified()) {
        <app-verify-email />
      }
    </div>

    <div class="header__actions">
      <app-theme-toggle />
      @if (userStore.isAuthenticated()) {
        <app-logout-button />
        <a
          class="settings-btn"
          routerLink="/settings"
          aria-label="Settings"
          title="Settings"
        >
          <svg
            class="settings-btn__icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <g class="settings-btn__glyph">
              <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
              <circle cx="12" cy="12" r="3"/>
            </g>
          </svg>
        </a>
      }
    </div>
  </div>

  <svg class="header__border" viewBox="0 0 1000 2" preserveAspectRatio="none" aria-hidden="true">
    <path #borderPath class="header__border-line" d="M0 1 L1000 1" />
  </svg>
</header>
