<main class="settings-layout">
  <header class="settings-topbar">
    <app-settings-autocomplete class="settings-topbar__search" />
    <button
      type="button"
      class="settings-topbar__toggle"
      (click)="toggleAside()"
      [attr.aria-expanded]="asideStore.isOpen()"
      aria-controls="settings-aside-drawer"
      aria-label="Open settings menu"
      i18n-aria-label="@@settings.aside.toggle"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    </button>
  </header>

  <aside class="settings-side">
    <app-settings-autocomplete class="settings-side__search" />
    <app-settings-nav class="settings-side__nav" />
  </aside>

  <div class="settings-content">
    <router-outlet />
  </div>

  @if (asideStore.isOpen()) {
    <div class="settings-drawer-backdrop" (click)="closeAside()" aria-hidden="true"></div>
    <aside
      id="settings-aside-drawer"
      class="settings-drawer"
      role="dialog"
      aria-label="Settings menu"
    >
      <header class="settings-drawer__header">
        <h2 class="settings-drawer__title" i18n="@@settings.aside.title">Settings</h2>
        <button
          type="button"
          class="settings-drawer__close"
          (click)="closeAside()"
          aria-label="Close settings menu"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </header>
      <div class="settings-drawer__body">
        <app-settings-nav />
      </div>
    </aside>
  }
</main>
