# List of detected languages
map $http_accept_language $accept_language {
  default "en";
  ~*^es es;
  ~*^en "en";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "UP\n";
    }

    location ~ ^/(api|login|oauth2)/ {
        proxy_pass         http://spring-boot:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 1h;
    }

    location = / {
      return 302 $scheme://$http_host/$accept_language/;
    }

    location / {
      return 302 $scheme://$http_host/$accept_language$request_uri;
    }

    location ~ ^/(en|es)(/.*)?$ {
      try_files $uri /$1/index.html;
    }

    location ~ "^/[a-z]{2}(-[A-Z]{2})?/" {
      return 302 $scheme://$http_host/en/;
    }

    server_tokens off;
}
