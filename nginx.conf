server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression for everything served from this site.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Hashed bundle assets: immutable for a year.
    # Angular's outputHashing=all gives each .js/.css/asset a content hash, so the
    # browser only refetches when the hash actually changes.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The shell itself must always come fresh, otherwise old users keep hitting
    # stale routes after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Container healthcheck endpoint.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "UP\n";
    }

    # Reverse-proxy /api/* to Spring so the SPA can use same-origin XHR.
    # Keeps cookies, no CORS preflight. spring-boot is the docker-compose
    # service name; reachable on the `stack` network.
    location /api/ {
        proxy_pass         http://spring-boot:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Don't buffer SSE streams (used by /api/admin/loadtest/runs/{id}/logs).
        proxy_buffering    off;
        proxy_read_timeout 1h;
    }

    # Same for OAuth callbacks.
    location /login/ {
        proxy_pass         http://spring-boot:8080;
        proxy_set_header   Host $host;
    }
    location /oauth2/ {
        proxy_pass         http://spring-boot:8080;
        proxy_set_header   Host $host;
    }

    # SPA fallback: any unmatched route renders index.html so Angular's router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't leak nginx version in headers.
    server_tokens off;
}
